---

name: "Run Linters"
on: push
concurrency:
  group: ${{ forgejo.workflow_ref }}
  cancel-in-progress: true

jobs:
  linters:
    name: "Run Linters"
    runs-on: codeberg-small-lazy
    timeout-minutes: 10
    steps:

      - name: "Install Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y reuse

          curl -fsSLo- "https://github.com/editorconfig-checker/editorconfig-checker/releases/download/v3.7.0/editorconfig-checker-linux-amd64.tar.gz" | sudo tar xvz -C /usr/bin editorconfig-checker
          curl -fsSLo- "https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh" | sh -s -- -b /usr/local/bin

      - name: "Checkout (for linting)"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Run Linters"
        run: |
          reuse lint
          editorconfig-checker --verbose
          trufflehog git file://. --results="verified,unknown" --concurrency="$(nproc)" --no-update --fail

...
