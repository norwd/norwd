---

name: "Debug Workflow Run"
run-name: "Debug Workflow Run"
permissions: read-all

on:
  repository_dispatch:
  workflow_dispatch:
  pull_request:
  push:
    paths: ['.forgejo/workflows/debug.yml']
  schedule:
    - cron: '0 0 * * 0'

env:
  GH_TOKEN: ${{ forgejo.token }}

jobs:

  debug:
    runs-on: codeberg-tiny
    steps:
      - run: echo "${JSON}"
        env:
          JSON: ${{ toJSON(forgejo) }}
