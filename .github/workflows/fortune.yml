---

name: "Setting Bio to Random Fortune"
run-name: "Setting Bio to ${{ inputs.fortune || 'Random Fortune' }}"
permissions: {}

concurrency:
  group: fortune
  cancel-in-progress: true

defaults:
  run:
    shell: bash

on:
  schedule:
    - cron: "0 * * * *"

  push:
    branches: main
    paths:
      - fortunes.json
      - .github/workflows/fortune.yml

  workflow_dispatch:
    inputs:
      fortune:
        description: "Specific fortune to use, if unset, a random fortune will be used."
        required: false
        type: string

env:
  GH_TOKEN: ${{ secrets.BIO_UPDATE_NORWD }}
  FORTUNE: ${{ inputs.fortune }}

jobs:
  set-bio:
    name: "Set bio"
    runs-on: ubuntu-latest
    steps:

      - name: "Checkout"
        uses: actions/checkout@v3

      - name: "Select Random Fortune"
        if: inputs.fortune == ''
        run: |
          dotnet run - << EOF
          var me = new norwd();
          var eof_marker = "$(head -c 8 /dev/random | hexdump -v -e '1/1 "%.2X"')";
          using var filestream = new FileStream("${GITHUB_ENV}", FileMode.Open);
          using var streamwriter = new StreamWriter(filestream);
          streamwriter.AutoFlush = true;
          Console.SetOut(streamwriter);
          Console.WriteLine(\$"FORTUNE<<{eof_marker}");
          Console.WriteLine(me.Fortune);
          Console.WriteLine(\$"{eof_marker}");
          public enum Pronoun {He,Him,His} // prevent syntax errors
          $(awk '/^```csharp$/,/^```$/{print}' README.md | head -n -1 | tail -n +2)
          EOF

      - name: "Install gh-user"
        run: gh extension install norwd/gh-user

      - name: "Set Bio"
        run: gh user bio "${FORTUNE}"
